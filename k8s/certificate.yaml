# 依赖：集群已安装 cert-manager
# ClusterIssuer 用 ACME(Let's Encrypt) HTTP-01 校验，按需替换 email/服务器地址

apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: admin@example.com
    privateKeySecretRef:
      name: letsencrypt-prod-key
    solvers:
      - http01:
          ingress:
            ingressClassName: apisix

---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: mall-tls
  namespace: mall
spec:
  secretName: mall-tls-secret
  duration: 2160h    # 90天
  renewBefore: 360h  # 到期前15天自动续期
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  dnsNames:
    - mall.example.com

---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: mall-media-tls
  namespace: mall
spec:
  secretName: media-tls-secret
  duration: 2160h
  renewBefore: 360h
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  dnsNames:
    - media.example.com

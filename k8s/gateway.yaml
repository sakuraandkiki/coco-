# 依赖：集群中已安装 APISIX + APISIX Ingress Controller（apisix 命名空间）
# WAF 使用 APISIX 的 Coraza/ModSecurity 插件（需要预先在 APISIX 侧启用对应插件运行时）
#
# 域名 mall.test 不在公网DNS上解析（IANA保留的.test测试域），仅通过手动配置 hosts 文件
# （把 mall.test 指向服务器公网IP）来访问，配合 k8s/certificate.yaml 的 SelfSigned 证书，
# 用于演示"网关绑定自定义域名 + HTTPS"，不依赖、也不触发国内域名备案要求。
# 对外网公开访问仍然走 http://<服务器IP>:<apisix-gateway NodePort>。

apiVersion: apisix.apache.org/v2
kind: ApisixTls
metadata:
  name: mall-tls
  namespace: mall
spec:
  hosts:
    - mall.test
  secret:
    name: mall-tls-secret
    namespace: mall

---
# 全局限流 + WAF 插件配置，供下面的路由引用
apiVersion: apisix.apache.org/v2
kind: ApisixPluginConfig
metadata:
  name: mall-security-plugins
  namespace: mall
spec:
  plugins:
    - name: limit-count
      enable: true
      config:
        count: 200
        time_window: 60
        key: remote_addr
        rejected_code: 429
    - name: modsecurity
      enable: true
      config:
        rules_set: "OWASP-CRS"

---
apiVersion: apisix.apache.org/v2
kind: ApisixRoute
metadata:
  name: mall-frontend-route
  namespace: mall
spec:
  http:
    - name: frontend
      match:
        hosts:
          - mall.test
        paths:
          - /*
      backends:
        - serviceName: frontend
          servicePort: 80
      plugin_config_name: mall-security-plugins

---
apiVersion: apisix.apache.org/v2
kind: ApisixRoute
metadata:
  name: mall-backend-route
  namespace: mall
spec:
  http:
    - name: backend-api
      match:
        hosts:
          - mall.test
        paths:
          - /api/*
      backends:
        - serviceName: backend
          servicePort: 8080
      plugin_config_name: mall-security-plugins
      plugins:
        - name: cors
          enable: true
          config:
            allow_origins: "https://mall.test"
            allow_methods: "GET,POST,PUT,DELETE,OPTIONS"
            allow_headers: "Authorization,Content-Type"
